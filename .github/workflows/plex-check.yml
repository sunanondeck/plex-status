name: Suplex Status Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check Suplex server
        run: |

          if curl -k -s --retry 3 --max-time 30 https://71.146.187.239:32400/identity > /dev/null; then
            STATUS="operational"
            MESSAGE="Suplex is running normally."
          else
            STATUS="outage"
            MESSAGE="Suplex is currently unreachable."
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq --arg status "$STATUS" \
             --arg message "$MESSAGE" \
             --arg time "$TIMESTAMP" \
             '.status=$status | .message=$message | .lastChecked=$time' \
             status.json > tmp.json

          mv tmp.json status.json

      - name: Commit only if status changed
        run: |
          git config --global user.name "status-bot"
          git config --global user.email "actions@github.com"

          git add status.json

          if git diff --cached --quiet; then
            echo "No status change"
          else
            git commit -m "Update Suplex status"
            git push
          fi
