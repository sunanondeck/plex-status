```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Is Suplex down?</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Prevent caching -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

body{
  margin:0;
  background:#111;
  color:white;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
  text-align:center;
}

/* Maintenance banner */

#banner{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#e5a00d;
  color:black;
  font-weight:600;
  padding:14px;
  z-index:1000;
}

.banner-visible main{
  margin-top:70px;
}

/* Layout */

main{
  padding-top:60px;
}

/* Title */

h1{
  font-size:42px;
  margin-bottom:40px;
}

/* Status box */

.answer-box{
  width:260px;
  height:140px;
  margin:0 auto;
  border:4px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:90px;
  font-weight:800;
}

/* status colors */

.operational{
  color:white;
  border-color:white;
}

.outage{
  color:#ff4d4d;
  border-color:#ff4d4d;
}

/* status message */

#message{
  font-size:20px;
  margin-top:20px;
}

/* last checked */

#checked{
  margin-top:30px;
  font-size:14px;
  opacity:0.7;
}

</style>
</head>

<body>

<div id="banner"></div>

<main>

<h1>Is Suplex down?</h1>

<div id="answerBox" class="answer-box">
<span id="answer">...</span>
</div>

<div id="message"></div>

<div id="checked"></div>

</main>

<script>

fetch("status.json?nocache=" + Date.now())
.then(r => r.json())
.then(data => {

  const answer = document.getElementById("answer");
  const box = document.getElementById("answerBox");
  const message = document.getElementById("message");
  const checked = document.getElementById("checked");
  const banner = document.getElementById("banner");

  if(data.status === "operational"){
      answer.textContent = "NO";
      box.className = "answer-box operational";
      message.className = "operational";
  } else {
      answer.textContent = "YES";
      box.className = "answer-box outage";
      message.className = "outage";
  }

  message.textContent = data.message;

  const d = new Date(data.last_checked);
  checked.textContent = "Last checked: " + d.toLocaleString();

  if(data.banner && data.banner.trim() !== ""){
      banner.textContent = data.banner;
      banner.style.display = "block";
      document.body.classList.add("banner-visible");
  }

});

</script>

</body>
</html>
```
